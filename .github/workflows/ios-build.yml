name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Install iOS dependencies
        run: |
          cd ios
          pod install
          
      - name: Build iOS app
        run: |
          cd ios
          xcodebuild -workspace MeshtasticCompass.xcworkspace \
            -scheme MeshtasticCompass \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath MeshtasticCompass.xcarchive \
            archive
            
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ios/MeshtasticCompass.xcarchive \
            -exportPath ios/export \
            -exportOptionsPlist ios/ExportOptions.plist
            
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshtastic-compass-ios
          path: ios/export/MeshtasticCompass.ipa
          retention-days: 30
