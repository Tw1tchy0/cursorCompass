name: Build iOS App (Stable RN Version)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm install
          
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          
      - name: Clean and prepare iOS
        run: |
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf build
          rm -rf ~/Library/Developer/Xcode/DerivedData
          
      - name: Install iOS dependencies (Force iOS 12.0)
        run: |
          cd ios
          # Force deployment target for all pods
          pod install --repo-update --verbose || {
            echo "First attempt failed, trying with deployment target fix..."
            # Try with explicit deployment target
            pod install --repo-update --verbose --deployment
          }
          
      - name: Build iOS app (Debug - No Signing)
        run: |
          cd ios
          xcodebuild -workspace MeshtasticCompass.xcworkspace \
            -scheme MeshtasticCompass \
            -configuration Debug \
            -destination generic/platform=iOS \
            -archivePath MeshtasticCompass.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            -allowProvisioningUpdates
            
      - name: Create IPA manually
        run: |
          cd ios
          mkdir -p export
          cd MeshtasticCompass.xcarchive/Products/Applications
          cp -r MeshtasticCompass.app ../../export/
          cd ../../export
          zip -r MeshtasticCompass.ipa MeshtasticCompass.app
          echo "IPA created successfully"
          ls -la
          
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshtastic-compass-ios-stable
          path: ios/export/MeshtasticCompass.ipa
          retention-days: 30
