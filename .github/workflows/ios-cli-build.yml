name: Build iOS App (React Native CLI)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm install
          npm install -g @react-native-community/cli
          
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          
      - name: Install iOS dependencies
        run: |
          cd ios
          pod install
          
      - name: Build iOS app using React Native CLI
        run: |
          npx react-native run-ios --configuration Debug --no-packager
          
      - name: Create IPA from build
        run: |
          # Find the built app
          APP_PATH=$(find ios/build -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "App not found, trying alternative path..."
            APP_PATH=$(find ios -name "MeshtasticCompass.app" | head -1)
          fi
          
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            mkdir -p ios/export
            cp -r "$APP_PATH" ios/export/
            cd ios/export
            zip -r MeshtasticCompass.ipa MeshtasticCompass.app
            echo "IPA created successfully"
            ls -la
          else
            echo "App not found in expected locations"
            find ios -name "*.app" -type d
            exit 1
          fi
          
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshtastic-compass-ios-cli
          path: ios/export/MeshtasticCompass.ipa
          retention-days: 30
