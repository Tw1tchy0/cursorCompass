name: Build iOS App (Debug - No Code Signing)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install dependencies
        run: |
          npm install
          
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          
      - name: Install iOS dependencies
        run: |
          cd ios
          pod install --verbose
          
      - name: Build iOS app (Debug - No Signing)
        run: |
          cd ios
          xcodebuild -workspace MeshtasticCompass.xcworkspace \
            -scheme MeshtasticCompass \
            -configuration Debug \
            -destination generic/platform=iOS \
            -archivePath MeshtasticCompass.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""
            
      - name: Create IPA manually (No Code Signing)
        run: |
          cd ios
          mkdir -p export
          cd MeshtasticCompass.xcarchive/Products/Applications
          cp -r MeshtasticCompass.app ../../export/
          cd ../../export
          # Create a simple zip file that can be used with AltStore
          zip -r MeshtasticCompass.ipa MeshtasticCompass.app
          echo "IPA created successfully"
          ls -la
          
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshtastic-compass-ios-debug
          path: ios/export/MeshtasticCompass.ipa
          retention-days: 30
